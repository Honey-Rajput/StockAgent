name: Daily Volume Surge Scanner

on:
  schedule:
    # 18:15 UTC = 11:45 PM IST (Monday to Friday)
    - cron: '15 18 * * 1-5'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # cache dependencies for faster runs

      - name: Install Dependencies
        run: |
          cd vdu_scanner
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Automated Headless Scanner
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          EURI_API_KEY: ${{ secrets.EURI_API_KEY }}
          EURI_BASE_URL: ${{ secrets.EURI_BASE_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          cd vdu_scanner
          python cron_scanner.py
